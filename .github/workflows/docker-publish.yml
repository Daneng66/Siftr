name: Publish Docker image

# Builds the all-in-one Siftr image and pushes it to GitHub Container Registry
# (GHCR). The build runs the same Dockerfile users would build on unraid, so the
# czkawka_cli download + --version smoke test gate every published image: if the
# deduper can't be installed, the workflow fails instead of shipping a broken
# image to anyone pulling from Community Apps.
#
#   - push a tag like v0.1.0  -> :0.1.0, :0.1, :latest
#   - push to the default branch -> :edge (rolling preview)
#   - manual run (workflow_dispatch) -> :edge

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # GHCR image paths must be lowercase; the owner (Daneng66) is not, so
      # derive a lowercase image reference for the metadata/build steps.
      - name: Compute lowercase image name
        run: echo "IMAGE=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags and labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/') }}
            type=edge,branch=main

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          # czkawka publishes an x86_64-linux CLI only, so the image is amd64.
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
