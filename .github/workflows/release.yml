name: Create Release

# Manually triggered: tags the current main HEAD (if not already tagged),
# creates a GitHub release, and fires docker-publish which builds versioned
# GHCR images from the tag.

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g. 0.1.5 — no leading v)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Tag and release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Push tag only if it doesn't already exist on the remote.
          if git ls-remote --tags origin "refs/tags/v${{ inputs.version }}" | grep -q .; then
            echo "Tag v${{ inputs.version }} already exists on remote — skipping tag push."
          else
            git tag "v${{ inputs.version }}"
            git push origin "v${{ inputs.version }}"
          fi
          gh release create "v${{ inputs.version }}" \
            --title "v${{ inputs.version }}" \
            --generate-notes
