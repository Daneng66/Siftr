name: Create Release

# Manually triggered: tags the current main HEAD, creates a GitHub release,
# and fires the docker-publish workflow which builds versioned GHCR images.

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g. 0.1.5 — no leading v)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Tag and release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "v${{ inputs.version }}"
          git push origin "v${{ inputs.version }}"
          gh release create "v${{ inputs.version }}" \
            --title "v${{ inputs.version }}" \
            --generate-notes
